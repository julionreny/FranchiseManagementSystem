$kind: http-request
name: Add Sale - High Value
method: POST
url: '{{baseUrl}}/api/sales/'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "branch_id": "{{branchId}}",
      "product_name": "Catering Package",
      "customer_name": "Corporate Client",
      "contact": "0198765432",
      "amount": 50000,
      "payment_method": "Bank Transfer",
      "sale_date": "2026-03-25",
      "created_by": 1
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", function() {
        pm.response.to.have.status(201);
      });

      pm.test("Amount is >= 10000 (notification should be triggered)", function() {
        var json = pm.response.json();
        pm.expect(json.amount).to.be.at.least(10000);
      });
