$kind: http-request
name: Login
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "owner@test.com",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 401", function() {
        pm.expect(pm.response.code).to.be.oneOf([200, 401]);
      });

      if (pm.response.code === 200) {
        pm.test("Response has user object with user_id and role_id", function() {
          var json = pm.response.json();
          pm.expect(json).to.have.property("user");
          pm.expect(json.user).to.have.property("user_id");
          pm.expect(json.user).to.have.property("role_id");
        });

        var json = pm.response.json();
        if (json.user && json.user.user_id) {
          pm.environment.set("ownerId", json.user.user_id);
        }
        if (json.user && json.user.franchise_id) {
          pm.environment.set("franchiseId", json.user.franchise_id);
        }
      }
