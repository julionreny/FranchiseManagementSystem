$kind: http-request
name: Register Manager
method: POST
url: '{{baseUrl}}/api/auth/manager/register'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test Manager",
      "email": "manager@test.com",
      "password": "password123",
      "invite_code": "abc12345"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200, 400, or 403", function() {
        pm.expect(pm.response.code).to.be.oneOf([200, 400, 403]);
      });

      pm.test("Response body is an object", function() {
        var json = pm.response.json();
        pm.expect(json).to.be.an("object");
      });
