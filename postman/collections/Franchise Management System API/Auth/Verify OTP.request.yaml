$kind: http-request
name: Verify OTP
method: POST
url: '{{baseUrl}}/api/auth/verify-otp'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "owner@test.com",
      "otp": "123456"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 400", function() {
        pm.expect(pm.response.code).to.be.oneOf([200, 400]);
      });

      pm.test("Response has message or error field", function() {
        var json = pm.response.json();
        pm.expect(json).to.satisfy(function(obj) {
          return obj.hasOwnProperty("message") || obj.hasOwnProperty("error");
        });
      });
