$kind: http-request
name: Get Franchise Overview
method: GET
url: '{{baseUrl}}/api/dashboard/franchise/{{franchiseId}}/overview'
order: 6000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 404", function() {
        pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });

      if (pm.response.code === 200) {
        pm.test("Response has franchise overview", function() {
          var json = pm.response.json();
          pm.expect(json).to.be.an("object");
        });
      }
