$kind: http-request
name: Get Owner Dashboard Stats
method: GET
url: '{{baseUrl}}/api/dashboard/owner/{{franchiseId}}'
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() {
        pm.response.to.have.status(200);
      });

      pm.test("Response has owner dashboard statistics", function() {
        var json = pm.response.json();
        pm.expect(json).to.be.an("object");
      });

      pm.test("Response contains franchise-wide stats", function() {
        var json = pm.response.json();
        pm.expect(json).to.have.any.keys("totalSales", "totalExpenses", "branchCount", "totalEmployees", "branches");
      });
