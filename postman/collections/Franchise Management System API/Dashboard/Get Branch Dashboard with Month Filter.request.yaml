$kind: http-request
name: Get Branch Dashboard with Month Filter
method: GET
url: '{{baseUrl}}/api/dashboard/branch/{{branchId}}?month=2024-01'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() {
        pm.response.to.have.status(200);
      });

      pm.test("Response is an object", function() {
        var json = pm.response.json();
        pm.expect(json).to.be.an("object");
      });

      pm.test("Filtered data returned", function() {
        var json = pm.response.json();
        pm.expect(json).to.have.any.keys("totalSales", "totalExpenses", "sales", "expenses", "month");
      });
