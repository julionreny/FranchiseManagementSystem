$kind: http-request
name: Get Owner Dashboard with Month Filter
method: GET
url: '{{baseUrl}}/api/dashboard/owner/{{franchiseId}}?month=2024-01'
order: 4000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() {
        pm.response.to.have.status(200);
      });

      pm.test("Response is an object", function() {
        var json = pm.response.json();
        pm.expect(json).to.be.an("object");
      });

      pm.test("Monthly filtered data returned", function() {
        var json = pm.response.json();
        pm.expect(json).to.have.any.keys("totalSales", "totalExpenses", "month");
      });
