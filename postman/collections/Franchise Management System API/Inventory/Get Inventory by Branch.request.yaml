$kind: http-request
name: Get Inventory by Branch
method: GET
url: '{{baseUrl}}/api/inventory/{{branchId}}'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() {
        pm.response.to.have.status(200);
      });

      pm.test("Response is an array", function() {
        var json = pm.response.json();
        pm.expect(json).to.be.an("array");
      });

      pm.test("Each item has inventory_id, product_name, quantity, unit, reorder_level", function() {
        var json = pm.response.json();
        if (json.length > 0) {
          json.forEach(function(item) {
            pm.expect(item).to.have.property("inventory_id");
            pm.expect(item).to.have.property("product_name");
            pm.expect(item).to.have.property("quantity");
            pm.expect(item).to.have.property("unit");
            pm.expect(item).to.have.property("reorder_level");
          });
        }
      });
