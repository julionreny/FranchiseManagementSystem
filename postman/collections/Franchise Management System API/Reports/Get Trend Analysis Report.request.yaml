$kind: http-request
name: Get Trend Analysis Report
method: GET
url: '{{baseUrl}}/api/reports/franchise/{{franchiseId}}/trends?period=quarterly&year=2024'
order: 13000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 404", function() {
        pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });

      if (pm.response.code === 200) {
        pm.test("Response has trend data", function() {
          var json = pm.response.json();
          pm.expect(json).to.be.an("object");
        });
      }
