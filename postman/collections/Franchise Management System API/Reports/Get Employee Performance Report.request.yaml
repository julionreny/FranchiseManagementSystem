$kind: http-request
name: Get Employee Performance Report
method: GET
url: '{{baseUrl}}/api/reports/branch/{{branchId}}/employee-performance'
order: 9000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 404", function() {
        pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });

      if (pm.response.code === 200) {
        pm.test("Response has employee performance data", function() {
          var json = pm.response.json();
          pm.expect(json).to.be.an("object").or.an("array");
        });
      }
