$kind: http-request
name: Get Branch Sales Report with Date Range
method: GET
url: '{{baseUrl}}/api/reports/branch/{{branchId}}/sales?startDate=2024-01-01&endDate=2024-12-31'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 404", function() {
        pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });

      if (pm.response.code === 200) {
        pm.test("Response has filtered sales data", function() {
          var json = pm.response.json();
          pm.expect(json).to.be.an("object").or.an("array");
        });
      }
