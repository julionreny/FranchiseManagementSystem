$kind: http-request
name: Get Branches by Franchise
method: GET
url: '{{baseUrl}}/api/branches/franchise/{{franchiseId}}'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() {
        pm.response.to.have.status(200);
      });

      pm.test("Response is an array", function() {
        var json = pm.response.json();
        pm.expect(json).to.be.an("array");
      });

      pm.test("Each item has branch_id, branch_name, location", function() {
        var json = pm.response.json();
        if (json.length > 0) {
          json.forEach(function(item) {
            pm.expect(item).to.have.property("branch_id");
            pm.expect(item).to.have.property("branch_name");
            pm.expect(item).to.have.property("location");
          });
        }
      });
