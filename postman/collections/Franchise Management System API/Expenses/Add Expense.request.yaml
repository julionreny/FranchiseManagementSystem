$kind: http-request
name: Add Expense
method: POST
url: '{{baseUrl}}/api/expenses/'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "branch_id": "{{branchId}}",
      "expense_type": "Utilities",
      "amount": 1200,
      "expense_date": "2026-03-25",
      "description": "Monthly electricity bill"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", function() {
        pm.response.to.have.status(201);
      });

      pm.test("Response has expense_id, expense_type, amount, priority", function() {
        var json = pm.response.json();
        pm.expect(json).to.have.property("expense_id");
        pm.expect(json).to.have.property("expense_type");
        pm.expect(json).to.have.property("amount");
        pm.expect(json).to.have.property("priority");
      });
