$kind: http-request
name: Get Expenses by Branch
method: GET
url: '{{baseUrl}}/api/expenses/{{branchId}}'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function() {
        pm.response.to.have.status(200);
      });

      pm.test("Response is an array", function() {
        var json = pm.response.json();
        pm.expect(json).to.be.an("array");
      });

      pm.test("Each item has expense_id, expense_type, amount", function() {
        var json = pm.response.json();
        if (json.length > 0) {
          json.forEach(function(item) {
            pm.expect(item).to.have.property("expense_id");
            pm.expect(item).to.have.property("expense_type");
            pm.expect(item).to.have.property("amount");
          });
        }
      });
